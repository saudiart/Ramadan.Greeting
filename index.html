<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بطاقة تهنئة عيد الفطر</title>
    <!-- Import Google Fonts for Arabic calligraphy and display text -->
    <link
      href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background image container -->
    <div class="background"></div>
    <div class="background-overlay"></div>
    <div class="floating-lights" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <!-- Main form container -->
    <div class="form-container">
      <img src="sat logo final.png" alt="SAT Logo" class="logo">
      <h1>اصنع بطاقة تهنئة عيد الفطر</h1>
      <p class="instruction">أدخل اسمك أدناه ليظهر على البطاقة</p>
      <input
        type="text"
        id="name-input"
        placeholder="أدخل الاسم هنا"
        maxlength="25"
        dir="rtl"
      />
      <button id="generate-btn">إنشاء البطاقة</button>
      <!-- Canvas for the generated greeting card -->
      <canvas
        id="result-canvas"
        width="1080"
        height="1920"
        hidden
      ></canvas>
      <!-- Download link appears after generation -->
      <a id="download-link" style="display: none" download="Eid_Al_Fitr_greeting.png"></a>
    </div>
    <!-- Append a version query string to the script to avoid caching issues -->
    <!-- Inline the script here to ensure the latest version is always loaded -->
    <script>
      // Preload fonts and assets then draw the greeting card when the user submits
      window.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('name-input');
        const generateBtn = document.getElementById('generate-btn');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const downloadLink = document.getElementById('download-link');

        // Preload background
        const background = new Image();
        background.src = 'IMG_20260319_222253.png';

        generateBtn.addEventListener('click', async () => {
          const name = nameInput.value.trim();
          if (!name) {
            alert('الرجاء إدخال الاسم أولاً');
            return;
          }
          const trimmedName = name.substring(0, 30);
          await drawCard(trimmedName);
        });

        async function drawCard(name) {
          canvas.hidden = false;
          downloadLink.style.display = 'none';

          await new Promise((resolve) => {
            if (background.complete) {
              resolve();
            } else {
              background.onload = () => resolve();
              background.onerror = () => resolve();
            }
          });

          await document.fonts.ready;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

          if ('direction' in ctx) {
            ctx.direction = 'rtl';
          }

          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
          ctx.shadowBlur = 18;
          ctx.shadowOffsetY = 6;

          let nameFontSize = 104;
          ctx.font = `bold ${nameFontSize}px "Noto Kufi Arabic"`;
          let measured = ctx.measureText(name);

          if (measured.width > canvas.width * 0.72) {
            nameFontSize = Math.floor(nameFontSize * (canvas.width * 0.72) / measured.width);
            ctx.font = `bold ${nameFontSize}px "Noto Kufi Arabic"`;
          }

          ctx.fillStyle = '#FFFFFF';
          const nameY = canvas.height * 0.76;
          ctx.fillText(name, canvas.width / 2, nameY);
          ctx.shadowColor = 'transparent';

          const dataURL = canvas.toDataURL('image/png');
          downloadLink.href = dataURL;
          downloadLink.download = `Eid_Al_Fitr_greeting_${Date.now()}.png`;
          downloadLink.textContent = 'تحميل البطاقة';
          downloadLink.style.display = 'inline-block';
          canvas.scrollIntoView({ behavior: 'smooth' });
        }
      });
    </script>
  </body>
</html>
